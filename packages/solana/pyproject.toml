[project]
name = "alien-sso-solana"
version = "0.1.0"
description = "Alien SSO Solana wallet linking + attestations (placeholder — port in progress)"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "httpx>=0.28.1",
    "solders>=0.27.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/alien_sso_solana"]
