[project]
name = "alien-sso-agent-id"
version = "0.1.0"
description = "Verify Alien Agent ID tokens — Ed25519 + RS256 owner chain verification"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "Alexander Temerev" }]
keywords = ["alien", "sso", "agent-id", "ed25519", "authentication"]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Topic :: Security :: Cryptography",
]
dependencies = [
    "cryptography>=42",
]

[project.optional-dependencies]
fastapi = ["fastapi>=0.100"]

[project.urls]
Homepage = "https://github.com/alien-id/sso-sdk-py"
Repository = "https://github.com/alien-id/sso-sdk-py"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/alien_sso_agent_id"]
